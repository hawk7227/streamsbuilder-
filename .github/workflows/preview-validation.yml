name: Preview Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  preview-build:
    name: Preview Build
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy-preview.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=!@streams/web
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Build web
        run: pnpm --filter @streams/web build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CI_LINT_PASSED: "true"
          CI_TYPECHECK_PASSED: "true"
          CI_TEST_PASSED: "true"

      - name: Deploy preview to Vercel
        id: deploy-preview
        run: |
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOY_URL"
        working-directory: apps/web

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deploy\n\n🔗 **${{ steps.deploy-preview.outputs.url }}**\n\nCommit: \`${{ github.sha }}\``
            })

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: preview-build
    if: needs.preview-build.outputs.preview_url != ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests against preview
        run: pnpm --filter @streams/web test:e2e
        env:
          BASE_URL: ${{ needs.preview-build.outputs.preview_url }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 14
